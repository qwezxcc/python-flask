<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}gamee{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="main-nav">
            <a href="{{ url_for('index') }}" class="nav-logo">🎮 gamee</a>
            <ul class="nav-menu">
                <li><a href="{{ url_for('index') }}" class="nav-link">main</a></li>
                <li><a href="{{ url_for('news') }}" class="nav-link">news</a></li>
                <li><a href="{{ url_for('about') }}" class="nav-link">credits</a></li>
                <li><a href="{{ url_for('login') }}" class="nav-link">login</a></li>
                <li><a href="{{ url_for('register') }}" class="nav-link auth-btn">register</a></li>
            </ul>
        </nav>
    </header>

    <main class="content-wrapper">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flash-messages">
                    {% for message in messages %}
                        <li class="flash-item">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>&copy; 2026 gamee. your personal game library.</p>
    </footer>
</script>
</body>
</html>
